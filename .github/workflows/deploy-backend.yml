name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: zet-backend
  REGION: europe-west1
  IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/zet-backend

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/91079905270/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-deploy@inbound-mote-491904-v2.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build Docker image
        run: docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest ./backend

      - name: Push Docker image
        run: |
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        run: |
          ENV_VARS="MONGO_URL=${{ secrets.MONGO_URL }}"
          ENV_VARS="$ENV_VARS,DB_NAME=${{ secrets.DB_NAME }}"
          ENV_VARS="$ENV_VARS,GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}"
          ENV_VARS="$ENV_VARS,GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}"
          ENV_VARS="$ENV_VARS,RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}"
          ENV_VARS="$ENV_VARS,SENDER_EMAIL=${{ secrets.SENDER_EMAIL }}"
          ENV_VARS="$ENV_VARS,GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"
          ENV_VARS="$ENV_VARS,CEO_PIN=${{ secrets.CEO_PIN }}"
          ENV_VARS="$ENV_VARS,FRONTEND_URL=${{ secrets.FRONTEND_URL }}"
          ENV_VARS="$ENV_VARS,ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }}"
          ENV_VARS="$ENV_VARS,LEMONSQUEEZY_API_KEY=${{ secrets.LEMONSQUEEZY_API_KEY }}"
          ENV_VARS="$ENV_VARS,LEMONSQUEEZY_WEBHOOK_SECRET=${{ secrets.LEMONSQUEEZY_WEBHOOK_SECRET }}"
          ENV_VARS="$ENV_VARS,LEMONSQUEEZY_STORE_ID=${{ secrets.LEMONSQUEEZY_STORE_ID }}"
          ENV_VARS="$ENV_VARS,LS_VARIANT_PLUS_MONTHLY=${{ secrets.LS_VARIANT_PLUS_MONTHLY }}"
          ENV_VARS="$ENV_VARS,LS_VARIANT_PLUS_YEARLY=${{ secrets.LS_VARIANT_PLUS_YEARLY }}"
          ENV_VARS="$ENV_VARS,LS_VARIANT_PRO_MONTHLY=${{ secrets.LS_VARIANT_PRO_MONTHLY }}"
          ENV_VARS="$ENV_VARS,LS_VARIANT_PRO_YEARLY=${{ secrets.LS_VARIANT_PRO_YEARLY }}"
          ENV_VARS="$ENV_VARS,LS_VARIANT_CS_MONTHLY=${{ secrets.LS_VARIANT_CS_MONTHLY }}"
          ENV_VARS="$ENV_VARS,LS_VARIANT_CS_YEARLY=${{ secrets.LS_VARIANT_CS_YEARLY }}"

          gcloud run deploy $SERVICE_NAME \
            --image $IMAGE:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 0 \
            --update-env-vars "$ENV_VARS" \
            --quiet

      - name: Show service URL
        run: |
          gcloud run services describe $SERVICE_NAME \
            --region $REGION \
            --format 'value(status.url)'
